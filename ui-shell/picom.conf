# CRIXA compositor profile: subtle motion, minimal shadows.
backend = "xrender";
vsync = true;
unredir-if-possible = false;
use-damage = true;
refresh-rate = 60;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

shadow = false;
fading = false;
fade-in-step = 0.0;
fade-out-step = 0.0;
fade-delta = 0;
fade-exclude = [
  "class_g = 'Rofi'",
  "name = 'CRIXAPanel'"
];

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
