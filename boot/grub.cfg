set default=0
set timeout=3

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

# On some UEFI systems GRUB starts from the EFI image, not the live payload.
# Force root to the volume that actually contains /live/vmlinuz.
if [ ! -f /live/vmlinuz ]; then
    search --no-floppy --set=root --file /live/vmlinuz
fi

menuentry "CRIXA OS v0 (Live)" {
    linux /live/vmlinuz boot=live components persistence quiet splash mitigations=off nowatchdog username=crixa hostname=crixa-os
    initrd /live/initrd
}

menuentry "CRIXA OS v0 (Live, Safe Graphics)" {
    linux /live/vmlinuz boot=live components persistence quiet nomodeset username=crixa hostname=crixa-os
    initrd /live/initrd
}

menuentry "CRIXA OS v0 (Live, Verbose Boot)" {
    linux /live/vmlinuz boot=live components persistence username=crixa hostname=crixa-os
    initrd /live/initrd
}
